name: Publish

permissions:
  contents: write

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  publish:
    runs-on: macos-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - run: ./gradlew build
      - run: ./gradlew jvmTest
      - run: ./gradlew iosSimulatorArm64Test
      - name: Link release CLI binaries (cross-compiled from macOS)
        run: |
          ./gradlew \
            :kmp-zip-cli:linkReleaseExecutableMacosArm64 \
            :kmp-zip-cli:linkReleaseExecutableMacosX64 \
            :kmp-zip-cli:linkReleaseExecutableLinuxX64 \
            :kmp-zip-cli:linkReleaseExecutableLinuxArm64 \
            :kmp-zip-cli:linkReleaseExecutableMingwX64
      - run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            kmp-zip-cli/build/bin/macosArm64/releaseExecutable/kmpzip-macos-arm64
            kmp-zip-cli/build/bin/macosX64/releaseExecutable/kmpzip-macos-x64
            kmp-zip-cli/build/bin/linuxX64/releaseExecutable/kmpzip-linux-x64
            kmp-zip-cli/build/bin/linuxArm64/releaseExecutable/kmpzip-linux-arm64
            kmp-zip-cli/build/bin/mingwX64/releaseExecutable/kmpzip-windows-x64.exe
          fail_on_unmatched_files: true
