name: CI

permissions:
  contents: read

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tasks: ":kmp-zip:jvmTest :kmp-zip:iosSimulatorArm64Test :kmp-zip:macosArm64Test :kmp-zip-okio:check :kmp-zip-kotlinx:check"
            primary: true
          - os: ubuntu-latest
            tasks: ":kmp-zip:jvmTest :kmp-zip:linuxX64Test :kmp-zip-okio:linuxX64Test :kmp-zip-kotlinx:linuxX64Test"
            primary: false
          - os: windows-latest
            tasks: ":kmp-zip:jvmTest :kmp-zip:mingwX64Test :kmp-zip-okio:mingwX64Test :kmp-zip-kotlinx:mingwX64Test"
            primary: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Run tests
        shell: bash
        run: ./gradlew ${{ matrix.tasks }}
      - name: Build all targets and publish to Maven Local
        if: matrix.primary
        shell: bash
        run: ./gradlew build publishToMavenLocal
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports-${{ matrix.os }}
          path: "**/build/reports/tests/"
      - uses: actions/upload-artifact@v7
        if: matrix.primary
        with:
          name: maven-artifacts
          path: ~/.m2/repository/no/synth/
